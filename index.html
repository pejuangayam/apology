<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Apologies Qien</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Caveat:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      background: #1a0c05;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      min-height: 100vh;
      background: #1a0c05;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-flowers {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .center-text {
      position: absolute;
      text-align: center;
      z-index: 2;
      pointer-events: none;
      user-select: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .center-text .sub {
      font-family: 'Caveat', cursive;
      font-size: 13px;
      color: #9a6a38;
      letter-spacing: 5px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }

    .center-text .main {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 32px;
      color: #d4a060;
      line-height: 1.15;
      display: block;
    }

    .center-text .orn {
      display: block;
      color: #6a3a18;
      font-size: 18px;
      margin-top: 8px;
      letter-spacing: 10px;
    }

    .postcard {
      position: absolute;
      width: 210px;
      height: 138px;
      cursor: pointer;
      z-index: 3;
      transition: transform 0.22s ease;
    }

    .postcard.tl {
      top: 8%;
      left: 5%;
      transform: rotate(-6deg);
    }

    .postcard.tr {
      top: 8%;
      right: 5%;
      transform: rotate(5deg);
    }

    .postcard.bl {
      bottom: 8%;
      left: 5%;
      transform: rotate(4deg);
    }

    .postcard.br {
      bottom: 8%;
      right: 5%;
      transform: rotate(-5deg);
    }

    .postcard:hover.tl {
      transform: rotate(-6deg) translateY(-6px) scale(1.04);
    }

    .postcard:hover.tr {
      transform: rotate(5deg) translateY(-6px) scale(1.04);
    }

    .postcard:hover.bl {
      transform: rotate(4deg) translateY(-6px) scale(1.04);
    }

    .postcard:hover.br {
      transform: rotate(-5deg) translateY(-6px) scale(1.04);
    }

    .card-face {
      width: 100%;
      height: 100%;
      background: linear-gradient(140deg, #d8ae6a, #c4904a, #ad7530);
      border-radius: 4px;
      border: 1px solid #8a5515;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.55);
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.22s;
    }

    .card-face::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 9px, rgba(60, 25, 5, 0.07) 9px, rgba(60, 25, 5, 0.07) 10px);
      pointer-events: none;
    }

    .postcard:hover .card-face {
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.65);
    }

    .c-seal {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #7a300a;
      border: 1.5px solid #5a1e06;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .c-seal .ti {
      font-size: 9px;
      color: #f0c860;
    }

    .c-stamp {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 34px;
      border: 1.5px solid #7a3e0a;
      border-radius: 2px;
      background: #e8c060;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .c-stamp-in {
      width: 20px;
      height: 26px;
      border: 1px solid #7a3e0a;
      background: #bf7a22;
      border-radius: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .c-stamp-in .ti {
      font-size: 10px;
      color: #fff5e0;
    }

    .c-label {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 46px;
    }

    .c-num {
      font-family: 'Caveat', cursive;
      font-size: 10px;
      color: #6a3208;
      display: block;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .c-title {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-style: italic;
      color: #2e1204;
      line-height: 1.3;
      font-weight: 600;
    }

    /* OVERLAY */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8, 3, 1, 0.92);
      z-index: 20;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .overlay.on {
      display: flex;
    }

    .letter {
      width: 340px;
      max-height: 92vh;
      overflow-y: auto;
      background: linear-gradient(155deg, #f6ead0, #ecddb0);
      border-radius: 5px;
      border: 1px solid #b08828;
      padding: 28px 24px 24px;
      position: relative;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.75);
      animation: pop 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.72) rotate(-3deg);
      }

      to {
        opacity: 1;
        transform: scale(1) rotate(0);
      }
    }

    .letter::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 26px, rgba(90, 50, 8, 0.1) 26px, rgba(90, 50, 8, 0.1) 27px);
      border-radius: 5px;
      pointer-events: none;
    }

    .l-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .l-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-style: italic;
      color: #3e1804;
      font-weight: 600;
    }

    .l-num {
      font-family: 'IM Fell English', serif;
      font-size: 11px;
      color: #8a5020;
      margin-top: 3px;
      letter-spacing: 2px;
    }

    .close-btn {
      width: 26px;
      height: 26px;
      border: 1px solid #a06020;
      background: transparent;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #6a2e0c;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .close-btn:hover {
      background: rgba(100, 46, 12, 0.15);
    }

    .close-btn .ti {
      font-size: 13px;
    }

    .l-divider {
      height: 1px;
      background: rgba(90, 50, 8, 0.2);
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .l-body {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 15px;
      color: #221004;
      line-height: 1.9;
      position: relative;
      z-index: 1;
      white-space: pre-wrap;
    }

    .l-footer {
      margin-top: 14px;
      text-align: right;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 13px;
      color: #7a3a14;
      position: relative;
      z-index: 1;
    }

    .frame-section {
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }

    .frame-lbl {
      font-family: 'Caveat', cursive;
      font-size: 11px;
      color: #8a5020;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
    }

    .photo-frame {
      width: 100%;
      aspect-ratio: 4/3;
      background: #e4d090;
      border: 2px solid #8a5415;
      box-shadow: inset 0 0 0 3px #f2e6b4, inset 0 0 0 5px #986418, inset 0 0 0 7px #f2e6b4;
      border-radius: 2px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    .photo-frame img.dynamic-photo {
      position: absolute;
      top: 7px;
      left: 7px;
      width: calc(100% - 14px);
      height: calc(100% - 14px);
      object-fit: cover;
      z-index: 6;
      /* Brought up so it can be clicked easily */
      border-radius: 1px;
      cursor: pointer;
      /* Makes it obvious it can be clicked */
      transition: transform 0.2s ease;
    }

    .photo-frame img.dynamic-photo:hover {
      transform: scale(1.02);
      /* Slight zoom on hover to indicate interactability */
    }

    .photo-frame::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px dashed rgba(90, 50, 8, 0.4);
      border-radius: 1px;
      pointer-events: none;
      z-index: 3;
    }

    .fc {
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: #5a2e0c;
      border-style: solid;
      border-width: 0;
      z-index: 4;
      pointer-events: none;
      /* Allows clicks to pass through to the image */
    }

    .fc.tl {
      top: 3px;
      left: 3px;
      border-top-width: 2px;
      border-left-width: 2px;
    }

    .fc.tr {
      top: 3px;
      right: 3px;
      border-top-width: 2px;
      border-right-width: 2px;
    }

    .fc.bl {
      bottom: 3px;
      left: 3px;
      border-bottom-width: 2px;
      border-left-width: 2px;
    }

    .fc.br {
      bottom: 3px;
      right: 3px;
      border-bottom-width: 2px;
      border-right-width: 2px;
    }

    .fp {
      z-index: 2;
    }

    .fp .ti {
      font-size: 28px;
      color: #a07030;
      opacity: 0.4;
    }

    .f-cap {
      font-family: 'Caveat', cursive;
      font-size: 13px;
      font-weight: bold;
      color: #3e1e04;
      opacity: 0.9;
      position: absolute;
      bottom: 8px;
      letter-spacing: 1px;
      z-index: 7;
      /* Keep text readable above image */
      text-shadow: 0 0 5px #e4d090, 0 0 8px #e4d090;
      pointer-events: none;
      /* Allows clicks to pass through to the image */
    }

    .hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Caveat', cursive;
      font-size: 12px;
      color: #5a2e12;
      letter-spacing: 2px;
      pointer-events: none;
      white-space: nowrap;
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.35
      }

      50% {
        opacity: 0.85
      }
    }

    /* --- NEW FULL SCREEN IMAGE VIEWER CSS --- */
    .image-viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8, 3, 1, 0.96);
      /* Matches your dark theme */
      z-index: 50;
      /* Needs to be higher than letter overlay */
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .image-viewer.show {
      display: flex;
      opacity: 1;
    }

    .image-viewer img {
      max-width: 95%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
      transform: scale(0.95);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .image-viewer.show img {
      transform: scale(1);
    }

    .iv-close {
      position: absolute;
      top: 25px;
      right: 25px;
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
      z-index: 51;
      width: 32px;
      height: 32px;
    }

    .iv-close:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

        <div class="c-stamp">
          <div class="c-stamp-in"><i class="ti ti-feather"></i></div>
        </div>
        <div class="c-label">
          <span class="c-num">Note · I</span>
          <div class="c-title">I am sorry for<br>the harsh words</div>
        </div>
      </div>
    </div>

    <div class="postcard tr" onclick="openCard(1)" role="button" tabindex="0" aria-label="Open Note II">
      <div class="card-face">
        <div class="c-seal"><i class="ti ti-heart"></i></div>
        <div class="c-stamp">
          <div class="c-stamp-in"><i class="ti ti-feather"></i></div>
        </div>
        <div class="c-label">
          <span class="c-num">Note · II</span>
          <div class="c-title">I am sorry for<br>being insensitive</div>
        </div>
      </div>
    </div>

    <div class="postcard bl" onclick="openCard(2)" role="button" tabindex="0" aria-label="Open Note III">
      <div class="card-face">
        <div class="c-seal"><i class="ti ti-heart"></i></div>
        <div class="c-stamp">
          <div class="c-stamp-in"><i class="ti ti-feather"></i></div>
        </div>
        <div class="c-label">
          <span class="c-num">Note · III</span>
          <div class="c-title">I am sorry for<br>the hurt I caused</div>
        </div>
      </div>
    </div>

    <div class="postcard br" onclick="openCard(3)" role="button" tabindex="0" aria-label="Open Note IV">
      <div class="card-face">
        <div class="c-seal"><i class="ti ti-heart"></i></div>
        <div class="c-stamp">
          <div class="c-stamp-in"><i class="ti ti-feather"></i></div>
        </div>
        <div class="c-label">
          <span class="c-num">Note · IV</span>
          <div class="c-title">I am sorry for<br>misunderstanding</div>
        </div>
      </div>
    </div>

    <div class="overlay" id="overlay" onclick="bgClose(event)">
      <div class="letter" id="letter">
        <div class="l-header">
          <div>
            <div class="l-title" id="mTitle"></div>
            <div class="l-num" id="mNum"></div>
          </div>
          <button class="close-btn" onclick="closeCard()" aria-label="Close">
            <i class="ti ti-x"></i>
          </button>
        </div>
        <div class="l-divider"></div>
        <div class="l-body" id="mBody"></div>
        <div class="l-footer">— with all my heart</div>
        <div class="frame-section">
          <div class="frame-lbl">· a memory ·</div>

          <div class="photo-frame">
            <img class="dynamic-photo" id="mImage" src="" alt="A memory" style="display: none;"
              onclick="openImageViewer()" title="Click to view full image">
            <div class="fc tl"></div>
            <div class="fc tr"></div>
            <div class="fc bl"></div>
            <div class="fc br"></div>
            <div class="fp" id="mPhotoIcon"><i class="ti ti-photo"></i></div>
            <div class="f-cap" id="mFrameLabel"></div>
          </div>

        </div>
      </div>
    </div>

    <div class="image-viewer" id="imageViewer" onclick="closeImageViewer(event)">
      <button class="close-btn iv-close" aria-label="Close Image Viewer">
        <i class="ti ti-x"></i>
      </button>
      <img id="fullImage" src="" alt="Full size memory">
    </div>

    <div class="hint">↑ tap card tu untuk bukak! ↑</div>
  </div>

  <script>
    const data = [
      {
        num: "Note · I",
        title: "I am sorry for the words that hurt you silently",
        body: "Im sorry sebab aku terlanjur cakap something yang buat mu terasa semalam and i don't mean it, it just me terikut with my emotion at that time and become insensitive to your feeling. Ku realize saying sorry all the time doesn't change the fact that aku tetap salah, but i will try my best to fix it i hope you can consider that. ",
        frame: "a memory of us",
        img: "asset/1.jpg"
      },
      {
        num: "Note · II",
        title: "I am sorry for being insensitive to your feelings",
        body: "Ku realize that you are a person that full of emotions, but you prefer to keep it hidden for the sake of others and ku should be more considerate on that, however the ku mess it up. Im at fault here and ku have no excuse for that, that is all on me and insyhaallah if we ever face this issue again ku akan try to be more considerate and put my words in a right way to ensure aku tak melebih. And now here i am saying sorry again for being insensitive terhadap mu :(",
        frame: "a memory of us",
        img: "asset/2.jpg"
      },
      {
        num: "Note · III",
        title: "I am sorry for the hurt I caused",
        body: "This is my apology for the time aku melebih, i mean mu hate it when aku do it and find it suffocating when i show my care dengan cara unexpected, im still figuring it out how to show affection in a way that did not burden mu, it is my try and error method and ku know for sure that there a time ku sedikit berkicap. I hope u can share me insight when i do it wrong, i think mesti mu rasa what man do ask guidance for woman , he should understand it itself. But im sorry qien ku still learning and a little word of guidance from you sangat ku appreciate untuk aku elak buat benda mu tak suka. Ku hope this postcard is not heavy for anda terutamanya this one.",
        frame: "a memory of us",
        img: "asset/3.jpg"
      },
      {
        num: "Note · IV",
        title: "I am sorry for being 'payah pehey' sometimes",
        body: "You know sometimes aku overanalyze your text and try to find the meaning behind it without asking twice sebab i know you said mu tak suka ulang oyak, but because of aku terlalu pegang dengan that phrase tu ku selalu salah pehey your point and mu mesti serabuk beacuse of that. Ku mintak maaf sangat sebab cuba intercept you without fully understand anda bebetul. Ku will try my best to fix that bad habit of mine. \n \nThis is extra i know u still the mad the fact our conversation yesterday is too much but ku hope at least you can reply me with what you really feel, i know you are trying my best and my niat is just untuk bantu ringankan beban mu ja. Maybe ku take that role too seriously and do something yang terlampau melulu, next time i should know better and discuss with anda. You are doing great qien, very great i mean it genuinely. I hope you can at least tell me what you feel and dont bottle up if there is an issue.",
        frame: "a memory of us",
        img: "asset/4.jpg"
      }
    ];

    function openCard(i) {
      const d = data[i];
      document.getElementById('mTitle').textContent = d.title;
      document.getElementById('mNum').textContent = d.num;
      document.getElementById('mBody').textContent = d.body;
      document.getElementById('mFrameLabel').textContent = d.frame;

      const imgEl = document.getElementById('mImage');
      const photoIcon = document.getElementById('mPhotoIcon');

      if (d.img) {
        imgEl.src = d.img;
        imgEl.style.display = 'block';
        if (photoIcon) photoIcon.style.display = 'none';
      } else {
        imgEl.style.display = 'none';
        if (photoIcon) photoIcon.style.display = 'flex';
      }

      document.getElementById('overlay').classList.add('on');
    }

    function closeCard() {
      document.getElementById('overlay').classList.remove('on');
    }

    function bgClose(e) {
      if (e.target === document.getElementById('overlay')) closeCard();
    }

    // --- NEW FUNCTIONS FOR IMAGE VIEWER ---
    function openImageViewer() {
      const imgSrc = document.getElementById('mImage').src;
      if (imgSrc && imgSrc !== window.location.href) {
        document.getElementById('fullImage').src = imgSrc;
        document.getElementById('imageViewer').classList.add('show');
      }
    }

    function closeImageViewer(e) {
      // Close if clicking the background area or the close button, but NOT when clicking the image itself
      if (e.target.id === 'imageViewer' || e.target.closest('.iv-close')) {
        document.getElementById('imageViewer').classList.remove('show');
      }
    }

    document.querySelectorAll('.postcard').forEach((el, i) => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') openCard(i);
      });
    });
  </script>
</body>

</html>
